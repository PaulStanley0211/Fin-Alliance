# docker-compose.test.yml — spins up FinAlly with LLM_MOCK=true for E2E tests.
#
# Usage:
#   docker compose -f test/docker-compose.test.yml up --build -d
#   (run Playwright on the host: cd test && npm test)
#   docker compose -f test/docker-compose.test.yml down -v
#
# We deliberately keep Playwright on the host rather than in a sidecar container —
# faster iteration, no nested networking, and matches how DevOps runs the smoke
# test in #14. See test/README.md.

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: finally:test
    container_name: finally-e2e-app
    environment:
      # Mandatory for tests: deterministic mock LLM responses (§9 mock dispatch table).
      LLM_MOCK: "true"
      # Anthropic key not used in mock mode, but the backend still loads .env;
      # provide a placeholder so import-time validation (if any) doesn't trip.
      ANTHROPIC_API_KEY: "test-mock-key"
      # Empty Massive key forces the simulator path — required for ticker-allowlist tests.
      MASSIVE_API_KEY: ""
      # Empty Finnhub key too — the simulator is the only source that streams
      # ticks regardless of market hours / weekend, which is required for the
      # E2E suite to be runnable any time of day. With FINNHUB_API_KEY set,
      # `current_price` stays null outside market hours and trades reject with
      # `price_unavailable`.
      FINNHUB_API_KEY: ""
    ports:
      # Host port 8001 (not 8000) to avoid colliding with the devops smoke
      # container (`finally:latest`) which auto-respawns on 8000. Tests
      # target this via FINALLY_BASE_URL in playwright.config.ts.
      - "8001:8000"
    volumes:
      # Ephemeral SQLite per test run — bind to a tmpfs-style anonymous volume so
      # the next `up` starts from a clean seed without requiring `down -v`.
      - finally-e2e-db:/app/db
    healthcheck:
      # Healthcheck runs INSIDE the container — uses container port 8000
      # regardless of the host port mapping above.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).status == 200 else 1)\""]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  finally-e2e-db:
